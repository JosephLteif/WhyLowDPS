name: Checks

on:
  pull_request:
  push:
    branches:
      - master
      - main

concurrency:
  group: checks-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    name: Detect Changed Areas
    runs-on: ubuntu-latest
    outputs:
      frontend: ${{ steps.filter.outputs.frontend }}
      backend: ${{ steps.filter.outputs.backend }}
      tauri: ${{ steps.filter.outputs.tauri }}
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Filter changed paths
        id: filter
        uses: dorny/paths-filter@v4
        with:
          filters: |
            frontend:
              - 'frontend/**'
              - '.github/workflows/**'
              - 'package.json'
              - 'package-lock.json'
              - 'frontend/package-lock.json'
              - '.nvmrc'
              - 'rust-toolchain.toml'
            backend:
              - 'backend/**'
              - 'scripts/**'
              - 'Cargo.toml'
              - 'Cargo.lock'
              - '.github/workflows/**'
              - 'package.json'
              - 'package-lock.json'
              - '.nvmrc'
              - 'rust-toolchain.toml'
            tauri:
              - 'desktop/**'
              - 'frontend/**'
              - 'backend/**'
              - 'scripts/**'
              - 'Cargo.toml'
              - 'Cargo.lock'
              - '.github/workflows/**'
              - 'package.json'
              - 'package-lock.json'
              - 'frontend/package-lock.json'
              - '.nvmrc'
              - 'rust-toolchain.toml'

  frontend_quality:
    name: Frontend Quality
    needs: changes
    if: needs.changes.outputs.frontend == 'true' && (github.event_name != 'push' || !startsWith(github.event.head_commit.message, 'chore(release):'))
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            package-lock.json
            frontend/package-lock.json

      - name: Install dependencies
        run: npm ci && npm ci --prefix frontend

      - name: Frontend checks
        run: npm run typecheck:frontend && npm run lint:frontend && npm run test:frontend

      - name: Build frontend
        run: npm run build:frontend

  backend_quality:
    name: Backend Quality
    needs: changes
    if: needs.changes.outputs.backend == 'true' && (github.event_name != 'push' || !startsWith(github.event.head_commit.message, 'chore(release):'))
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 20

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.94.1
          components: rustfmt, clippy

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2

      - name: Backend checks
        run: cargo clippy -p whylowdps-core -p whylowdps-server --all-targets

      - name: Backend and script tests
        run: cargo test -p whylowdps-core -p whylowdps-server && node --test scripts/tests/*.test.js

  tauri_build_check:
    if: (github.event_name == 'pull_request' || github.event_name == 'push') && needs.changes.outputs.tauri == 'true' && (github.event_name != 'push' || !startsWith(github.event.head_commit.message, 'chore(release):'))
    needs: changes
    name: Tauri Build Check
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            package-lock.json
            frontend/package-lock.json

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.94.1
          components: rustfmt, clippy

      - name: Ensure Tauri resource paths exist
        shell: bash
        run: |
          mkdir -p backend/resources/data
          echo "{}" > backend/resources/zones-encounters-index.json
          touch backend/resources/data/.keep

      - name: Install dependencies
        run: npm ci && npm ci --prefix frontend

      - name: Run Tauri build check
        run: npm run tauri:build:check

      - name: Check desktop Rust formatting
        run: cargo fmt --manifest-path desktop/src-tauri/Cargo.toml -- --check

      - name: Run desktop tests
        run: cargo test --manifest-path desktop/src-tauri/Cargo.toml app_logic::tests

  lifecycle_checks:
    if: always()
    needs:
      - changes
      - frontend_quality
      - backend_quality
      - tauri_build_check
    name: Lifecycle Checks
    runs-on: ubuntu-latest
    steps:
      - name: Fail when a workflow job failed or was cancelled
        if: >-
          needs.changes.result == 'failure' ||
          needs.changes.result == 'cancelled' ||
          needs.frontend_quality.result == 'failure' ||
          needs.frontend_quality.result == 'cancelled' ||
          needs.backend_quality.result == 'failure' ||
          needs.backend_quality.result == 'cancelled' ||
          needs.tauri_build_check.result == 'failure' ||
          needs.tauri_build_check.result == 'cancelled'
        run: exit 1

      - name: Report lifecycle checks
        run: echo "All applicable lifecycle checks completed successfully or were not applicable."
