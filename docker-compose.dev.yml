name: whylowdps-dev

services:
  postgres:
    image: postgres:17
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=whylowdps
      - POSTGRES_PASSWORD=whylowdps
      - POSTGRES_DB=whylowdps
    volumes:
      - whylowdps-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U whylowdps"]
      interval: 2s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: backend
      dockerfile: server/Dockerfile
      args:
        - SIMC_VERSION=${SIMC_VERSION:-HEAD}
        - CARGO_FEATURES=postgres
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - DATA_DIR=/app/resources/data
      - DATABASE_URL=postgres://whylowdps:whylowdps@postgres/whylowdps
      - PORT=8000
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: frontend
      args:
        - NEXT_PUBLIC_API_URL=http://localhost:8000
        - INTERNAL_API_URL=http://backend:8000
    environment:
      - INTERNAL_API_URL=http://backend:8000
    ports:
      - "3000:3000"

volumes:
  whylowdps-pgdata:
