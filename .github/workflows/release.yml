name: Release
on:
  push:
    tags:
      - 'v*'

jobs:
  publish:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: 'windows'
            os: 'windows-latest'
            args: '--config src-tauri/tauri.conf.json --bundles nsis'

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: |
            package-lock.json
            frontend/package-lock.json

      - name: install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: install dependencies
        run: npm ci && npm ci --prefix frontend

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            desktop/src-tauri -> target

      - name: Cache Next build cache
        uses: actions/cache@v4
        with:
          path: frontend/.next/cache
          key: ${{ runner.os }}-nextjs-release-${{ hashFiles('frontend/package-lock.json', 'frontend/tsconfig.json', 'frontend/tailwind.config.ts', 'frontend/next.config.js', 'frontend/next.config.mjs', 'frontend/next.config.ts') }}
          restore-keys: |
            ${{ runner.os }}-nextjs-release-

      - name: Ensure bundled resource paths exist
        shell: bash
        run: |
          mkdir -p backend/resources/data
          mkdir -p backend/resources/simc
          touch backend/resources/data/.keep
          touch backend/resources/simc/.keep

      # -- SimC Preparation (Disabled: App now downloads SimC on demand) --
      # - name: Resolve SimC version
      #   id: simc-version
      #   shell: bash
      #   run: |
      #     HASH=$(git ls-remote https://github.com/simulationcraft/simc.git HEAD | cut -f1)
      #     echo "hash=$HASH" >> "$GITHUB_OUTPUT"

      # - name: Cache SimC binary
      #   id: simc-cache
      #   uses: actions/cache@v4
      #   with:
      #     path: backend/resources/simc
      #     key: ${{ runner.os }}-simc-${{ steps.simc-version.outputs.hash }}

      # - name: Download SimC binary (Windows)
      #   if: steps.simc-cache.outputs.cache-hit != 'true' && matrix.platform == 'windows'
      #   shell: bash
      #   run: |
      #     mkdir -p backend/resources/simc
      #     curl -L "https://nightly.link/simulationcraft/simc-publish/workflows/nightly/master/simc-nightly-win64-midnight.zip" -o simc_win.zip
      #     unzip simc_win.zip -d backend/resources/simc/
      #     find backend/resources/simc -name "*.7z" -exec 7z x {} -obackend/resources/simc/ \;
      #     find backend/resources/simc -name "simc.exe" -exec mv {} backend/resources/simc/ \;
      #     touch backend/resources/simc/.keep

      # Game data is synchronized at app launch; skip heavy data-fetch step during release builds.

      - name: Enable Updater Artifacts
        shell: bash
        run: |
          sed -i 's/"createUpdaterArtifacts": false/"createUpdaterArtifacts": true/g' desktop/src-tauri/tauri.conf.json

      # -- Build and Release --
      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          DESKTOP_BUILD: true
          NEXT_PUBLIC_DESKTOP_BUILD: true
        with:
          projectPath: desktop
          tagName: ${{ github.ref_name }}
          releaseName: "WhyLowDps ${{ github.ref_name }}"
          releaseBody: "See the assets below for the installers."
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}
