name: Checks

on:
  pull_request:
  push:
    branches:
      - master
      - main

jobs:
  quality:
    name: Typecheck, Lint, Test, Frontend Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            package-lock.json
            frontend/package-lock.json

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Linux system dependencies (GLib)
        run: |
          sudo apt-get update
          sudo apt-get install -y pkg-config libglib2.0-dev

      - name: Install dependencies
        run: npm ci && npm ci --prefix frontend

      - name: Run check suite
        run: npm run check

      - name: Build frontend
        run: npm run build:frontend

  tauri_build_check:
    name: Tauri Build Check
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            package-lock.json
            frontend/package-lock.json

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        run: npm ci && npm ci --prefix frontend

      - name: Run Tauri build check
        run: npm run tauri:build:check
