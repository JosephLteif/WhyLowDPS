name: Release

on:
  push:
    tags:
      - 'v*'
  schedule:
    - cron: '0 1 * * *'
    - cron: '0 2 * * 1'
  workflow_dispatch:
    inputs:
      source_ref:
        description: 'Git ref to release from (tag, branch, or commit SHA)'
        required: true
        default: master
        type: string
      release_mode:
        description: 'Release mode'
        required: true
        default: stable
        type: choice
        options:
          - stable
          - weekly
          - nightly
      release_type:
        description: 'Semantic version bump type (stable mode only)'
        required: true
        default: patch
        type: choice
        options:
          - patch
          - minor
          - major

jobs:
  bump-version-stable:
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.release_mode == 'stable'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout master
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.source_ref }}
          fetch-depth: 0
          token: ${{ secrets.RELEASE_TOKEN }}

      - name: Setup node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: |
            package-lock.json
            frontend/package-lock.json

      - name: Install dependencies
        run: npm ci && npm ci --prefix frontend

      - name: Bump VERSION and sync files
        id: bump
        shell: bash
        run: |
          set -euo pipefail
          CURRENT_VERSION="$(tr -d '\r\n' < VERSION)"
          echo "Current version: ${CURRENT_VERSION}"
          NEW_VERSION="$(npm version "${{ github.event.inputs.release_type }}" --no-git-tag-version | sed 's/^v//')"
          echo "${NEW_VERSION}" > VERSION
          npm run sync:version
          npm install --package-lock-only
          npm install --package-lock-only --prefix frontend
          echo "new_version=${NEW_VERSION}" >> "$GITHUB_OUTPUT"

      - name: Commit and tag release
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add VERSION package.json frontend/package.json Cargo.toml backend/Cargo.toml desktop/src-tauri/tauri.conf.json desktop/src-tauri/tauri.docker.conf.json package-lock.json frontend/package-lock.json
          if git diff --cached --quiet; then
            echo "No version changes detected; skipping commit/tag."
            exit 0
          fi
          git commit -m "chore(release): bump version to v${{ steps.bump.outputs.new_version }}"
          git tag "v${{ steps.bump.outputs.new_version }}"
          git push origin master
          git push origin "v${{ steps.bump.outputs.new_version }}"

  create-channel-tag:
    if: github.event_name == 'schedule' || (github.event_name == 'workflow_dispatch' && github.event.inputs.release_mode != 'stable')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout master
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.source_ref }}
          fetch-depth: 0
          token: ${{ secrets.RELEASE_TOKEN }}

      - name: Setup node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: |
            package-lock.json
            frontend/package-lock.json

      - name: Compute channel version
        id: channel
        shell: bash
        run: |
          set -euo pipefail

          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            CHANNEL="${{ github.event.inputs.release_mode }}"
          else
            case "${{ github.event.schedule }}" in
              '0 2 * * 1') CHANNEL="weekly" ;;
              *) CHANNEL="nightly" ;;
            esac
          fi

          BASE_VERSION="$(tr -d '\r\n' < VERSION)"
          if [[ "$CHANNEL" == "nightly" ]]; then
            STAMP="$(date -u +%Y%m%d)"
          elif [[ "$CHANNEL" == "weekly" ]]; then
            STAMP="$(date -u +%G%V)"
          else
            echo "Unsupported channel: $CHANNEL"
            exit 1
          fi

          NEW_VERSION="${BASE_VERSION}-${CHANNEL}.${STAMP}"
          TAG="v${NEW_VERSION}"

          if git ls-remote --exit-code --tags origin "refs/tags/${TAG}" >/dev/null 2>&1; then
            echo "Tag ${TAG} already exists. Skipping."
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "skip=false" >> "$GITHUB_OUTPUT"
          echo "channel=${CHANNEL}" >> "$GITHUB_OUTPUT"
          echo "new_version=${NEW_VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"

      - name: Prepare channel version files
        if: steps.channel.outputs.skip != 'true'
        shell: bash
        run: |
          set -euo pipefail
          echo "${{ steps.channel.outputs.new_version }}" > VERSION
          npm run sync:version
          npm install --package-lock-only
          npm install --package-lock-only --prefix frontend

      - name: Commit and push channel tag
        if: steps.channel.outputs.skip != 'true'
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add VERSION package.json frontend/package.json Cargo.toml backend/Cargo.toml desktop/src-tauri/tauri.conf.json desktop/src-tauri/tauri.docker.conf.json package-lock.json frontend/package-lock.json
          git commit -m "chore(release): ${{ steps.channel.outputs.channel }} build v${{ steps.channel.outputs.new_version }}"
          git tag "${{ steps.channel.outputs.tag }}"
          git push origin "${{ steps.channel.outputs.tag }}"

  publish:
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: 'windows'
            os: 'windows-latest'
            args: '--config src-tauri/tauri.conf.json --bundles nsis'

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Determine release channel
        id: release_channel
        shell: bash
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          if [[ "$TAG" == *"-nightly."* ]]; then
            echo "channel=nightly" >> "$GITHUB_OUTPUT"
          elif [[ "$TAG" == *"-weekly."* ]]; then
            echo "channel=weekly" >> "$GITHUB_OUTPUT"
          else
            echo "channel=stable" >> "$GITHUB_OUTPUT"
          fi

      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: |
            package-lock.json
            frontend/package-lock.json

      - name: install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: install dependencies
        run: npm ci && npm ci --prefix frontend

      - name: Sync version from VERSION file
        run: npm run sync:version

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            desktop/src-tauri -> target

      - name: Cache Next build cache
        uses: actions/cache@v4
        with:
          path: frontend/.next/cache
          key: ${{ runner.os }}-nextjs-release-${{ hashFiles('frontend/package-lock.json', 'frontend/tsconfig.json', 'frontend/tailwind.config.ts', 'frontend/next.config.js', 'frontend/next.config.mjs', 'frontend/next.config.ts') }}
          restore-keys: |
            ${{ runner.os }}-nextjs-release-

      - name: Ensure bundled resource paths exist
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p backend/resources/data
          mkdir -p backend/resources/simc
          if [[ ! -f backend/resources/zones-encounters-index.json ]]; then
            echo "backend/resources/zones-encounters-index.json is required for release bundles"
            exit 1
          fi
          cp backend/resources/zones-encounters-index.json backend/resources/data/zones-encounters-index.json
          touch backend/resources/data/.keep
          touch backend/resources/simc/.keep

      - name: Refresh bundled SimC for all release channels
        if: matrix.platform == 'windows'
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p backend/resources/simc
          rm -f backend/resources/simc/simc.exe backend/resources/simc/simc
          curl -L "https://nightly.link/simulationcraft/simc-publish/workflows/nightly/master/simc-nightly-win64-midnight.zip" -o simc_win.zip
          unzip -o simc_win.zip -d backend/resources/simc/
          find backend/resources/simc -name "*.7z" -exec 7z x {} -obackend/resources/simc/ \;
          SIMC_PATH="$(find backend/resources/simc -iname "simc.exe" | head -n 1)"
          if [[ -z "$SIMC_PATH" ]]; then
            echo "Failed to locate extracted simc.exe"
            exit 1
          fi
          cp "$SIMC_PATH" backend/resources/simc/simc.exe
          echo "${GITHUB_REF_NAME#v}" > backend/resources/simc/simc-version
          touch backend/resources/simc/.keep

      - name: Build and release desktop app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          DESKTOP_BUILD: true
          NEXT_PUBLIC_DESKTOP_BUILD: true
        with:
          projectPath: desktop
          tagName: ${{ github.ref_name }}
          releaseName: "WhyLowDps ${{ github.ref_name }}"
          releaseBody: "See the assets below for the installers."
          releaseDraft: false
          prerelease: ${{ contains(github.ref_name, '-nightly.') || contains(github.ref_name, '-weekly.') }}
          args: ${{ matrix.args }}

      - name: Upload zones encounters index asset
        if: matrix.platform == 'windows'
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          gh release upload "${GITHUB_REF_NAME}" backend/resources/zones-encounters-index.json --clobber
