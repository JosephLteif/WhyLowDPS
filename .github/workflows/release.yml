name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      source_ref:
        description: 'Git ref to release from (tag, branch, or commit SHA)'
        required: true
        default: master
        type: string
      release_type:
        description: 'Semantic version bump type'
        required: true
        default: patch
        type: choice
        options:
          - patch
          - minor
          - major

jobs:
  bump-version-stable:
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout master
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.source_ref }}
          fetch-depth: 0
          token: ${{ secrets.RELEASE_TOKEN }}

      - name: Setup node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: |
            package-lock.json
            frontend/package-lock.json

      - name: Install dependencies
        run: npm ci && npm ci --prefix frontend

      - name: Bump VERSION and sync files
        id: bump
        shell: bash
        run: |
          set -euo pipefail
          CURRENT_VERSION="$(tr -d '\r\n' < VERSION)"
          echo "Current version: ${CURRENT_VERSION}"
          NEW_VERSION="$(npm version "${{ github.event.inputs.release_type }}" --no-git-tag-version | sed 's/^v//')"
          echo "${NEW_VERSION}" > VERSION
          npm run sync:version
          npm install --package-lock-only
          npm install --package-lock-only --prefix frontend
          echo "new_version=${NEW_VERSION}" >> "$GITHUB_OUTPUT"

      - name: Commit and tag release
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add VERSION package.json frontend/package.json Cargo.toml backend/Cargo.toml desktop/src-tauri/tauri.conf.json desktop/src-tauri/tauri.docker.conf.json package-lock.json frontend/package-lock.json
          if git diff --cached --quiet; then
            echo "No version changes detected; skipping commit/tag."
            exit 0
          fi
          git commit -m "chore(release): bump version to v${{ steps.bump.outputs.new_version }}"
          git tag "v${{ steps.bump.outputs.new_version }}"
          git push origin master
          git push origin "v${{ steps.bump.outputs.new_version }}"

  publish:
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: 'windows'
            os: 'windows-latest'
            args: '--config src-tauri/tauri.conf.json --bundles nsis'

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: |
            package-lock.json
            frontend/package-lock.json

      - name: install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: install dependencies
        run: npm ci && npm ci --prefix frontend

      - name: Sync version from VERSION file
        run: npm run sync:version

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            desktop/src-tauri -> target

      - name: Cache Next build cache
        uses: actions/cache@v4
        with:
          path: frontend/.next/cache
          key: ${{ runner.os }}-nextjs-release-${{ hashFiles('frontend/package-lock.json', 'frontend/tsconfig.json', 'frontend/tailwind.config.ts', 'frontend/next.config.js', 'frontend/next.config.mjs', 'frontend/next.config.ts') }}
          restore-keys: |
            ${{ runner.os }}-nextjs-release-

      - name: Ensure bundled resource paths exist
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p backend/resources/data
          if [[ ! -f backend/resources/zones-encounters-index.json ]]; then
            echo "backend/resources/zones-encounters-index.json is required for release bundles"
            exit 1
          fi
          cp backend/resources/zones-encounters-index.json backend/resources/data/zones-encounters-index.json
          touch backend/resources/data/.keep

      - name: Build and release desktop app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          DESKTOP_BUILD: true
          NEXT_PUBLIC_DESKTOP_BUILD: true
        with:
          projectPath: desktop
          tagName: ${{ github.ref_name }}
          releaseName: "WhyLowDps ${{ github.ref_name }}"
          releaseBody: "Release assets uploaded. Checksums will be added automatically."
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}

      - name: Upload zones encounters index asset
        if: matrix.platform == 'windows'
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          gh release upload "${GITHUB_REF_NAME}" backend/resources/zones-encounters-index.json --clobber

      - name: Generate release checksums and notes
        if: matrix.platform == 'windows'
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          TAG="${GITHUB_REF_NAME}"
          VERSION="${TAG#v}"
          TMP_DIR="$(mktemp -d)"
          NOTES_FILE="${TMP_DIR}/release-notes.md"
          CHECKSUM_FILE="${TMP_DIR}/checksums.txt"
          ASSET_LIST_FILE="${TMP_DIR}/assets.txt"

          gh release download "${TAG}" --dir "${TMP_DIR}"

          mapfile -t ASSET_FILES < <(find "${TMP_DIR}" -maxdepth 1 -type f -printf '%f\n' | sort)
          if [[ "${#ASSET_FILES[@]}" -eq 0 ]]; then
            echo "No release assets found for ${TAG}"
            exit 1
          fi

          : > "${CHECKSUM_FILE}"
          : > "${ASSET_LIST_FILE}"
          for FILE in "${ASSET_FILES[@]}"; do
            HASH="$(sha256sum "${TMP_DIR}/${FILE}" | awk '{print $1}')"
            printf '%s  %s\n' "${FILE}" "${HASH}" >> "${CHECKSUM_FILE}"
            printf '%s\n' "${FILE}" >> "${ASSET_LIST_FILE}"
          done

          node scripts/release-notes.js \
            --version "${VERSION}" \
            --assets-file "${ASSET_LIST_FILE}" \
            --checksums-file "${CHECKSUM_FILE}" \
            --output "${NOTES_FILE}"

          gh release edit "${TAG}" --notes-file "${NOTES_FILE}"

      - name: Notify Discord release channel
        if: matrix.platform == 'windows'
        shell: bash
        env:
          CHANNEL: stable
          TAG: ${{ github.ref_name }}
          RELEASE_URL: ${{ github.server_url }}/${{ github.repository }}/releases/tag/${{ github.ref_name }}
          STABLE_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK_STABLE }}
        run: |
          set -euo pipefail
          node scripts/notify-discord-release.js
