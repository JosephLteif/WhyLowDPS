name: Release
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      release_type:
        description: 'Semantic version bump type'
        required: true
        default: patch
        type: choice
        options:
          - patch
          - minor
          - major

jobs:
  bump-version:
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout master
        uses: actions/checkout@v4
        with:
          ref: master
          fetch-depth: 0
          token: ${{ secrets.RELEASE_TOKEN }}

      - name: Setup node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: |
            package-lock.json
            frontend/package-lock.json

      - name: Install dependencies
        run: npm ci && npm ci --prefix frontend

      - name: Bump VERSION and sync files
        id: bump
        shell: bash
        run: |
          set -euo pipefail
          CURRENT_VERSION="$(tr -d '\r\n' < VERSION)"
          echo "Current version: ${CURRENT_VERSION}"
          NEW_VERSION="$(npm version "${{ github.event.inputs.release_type }}" --no-git-tag-version | sed 's/^v//')"
          echo "${NEW_VERSION}" > VERSION
          npm run sync:version
          npm install --package-lock-only
          npm install --package-lock-only --prefix frontend
          echo "new_version=${NEW_VERSION}" >> "$GITHUB_OUTPUT"

      - name: Commit and tag release
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add VERSION package.json frontend/package.json Cargo.toml backend/Cargo.toml desktop/src-tauri/tauri.conf.json desktop/src-tauri/tauri.docker.conf.json package-lock.json frontend/package-lock.json
          if git diff --cached --quiet; then
            echo "No version changes detected; skipping commit/tag."
            exit 0
          fi
          git commit -m "chore(release): bump version to v${{ steps.bump.outputs.new_version }}"
          git tag "v${{ steps.bump.outputs.new_version }}"
          git push origin master
          git push origin "v${{ steps.bump.outputs.new_version }}"

  publish:
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: 'windows'
            os: 'windows-latest'
            args: '--config src-tauri/tauri.conf.json --bundles nsis'

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: |
            package-lock.json
            frontend/package-lock.json

      - name: install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: install dependencies
        run: npm ci && npm ci --prefix frontend

      - name: Sync version from VERSION file
        run: npm run sync:version

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            desktop/src-tauri -> target

      - name: Cache Next build cache
        uses: actions/cache@v4
        with:
          path: frontend/.next/cache
          key: ${{ runner.os }}-nextjs-release-${{ hashFiles('frontend/package-lock.json', 'frontend/tsconfig.json', 'frontend/tailwind.config.ts', 'frontend/next.config.js', 'frontend/next.config.mjs', 'frontend/next.config.ts') }}
          restore-keys: |
            ${{ runner.os }}-nextjs-release-

      - name: Ensure bundled resource paths exist
        shell: bash
        run: |
          mkdir -p backend/resources/data
          mkdir -p backend/resources/simc
          touch backend/resources/data/.keep
          touch backend/resources/simc/.keep

      # -- SimC Preparation (Disabled: App now downloads SimC on demand) --
      # - name: Resolve SimC version
      #   id: simc-version
      #   shell: bash
      #   run: |
      #     HASH=$(git ls-remote https://github.com/simulationcraft/simc.git HEAD | cut -f1)
      #     echo "hash=$HASH" >> "$GITHUB_OUTPUT"

      # - name: Cache SimC binary
      #   id: simc-cache
      #   uses: actions/cache@v4
      #   with:
      #     path: backend/resources/simc
      #     key: ${{ runner.os }}-simc-${{ steps.simc-version.outputs.hash }}

      # - name: Download SimC binary (Windows)
      #   if: steps.simc-cache.outputs.cache-hit != 'true' && matrix.platform == 'windows'
      #   shell: bash
      #   run: |
      #     mkdir -p backend/resources/simc
      #     curl -L "https://nightly.link/simulationcraft/simc-publish/workflows/nightly/master/simc-nightly-win64-midnight.zip" -o simc_win.zip
      #     unzip simc_win.zip -d backend/resources/simc/
      #     find backend/resources/simc -name "*.7z" -exec 7z x {} -obackend/resources/simc/ \;
      #     find backend/resources/simc -name "simc.exe" -exec mv {} backend/resources/simc/ \;
      #     touch backend/resources/simc/.keep

      # Game data is synchronized at app launch; skip heavy data-fetch step during release builds.

      # -- Build and Release --
      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          DESKTOP_BUILD: true
          NEXT_PUBLIC_DESKTOP_BUILD: true
        with:
          projectPath: desktop
          tagName: ${{ github.ref_name }}
          releaseName: "WhyLowDps ${{ github.ref_name }}"
          releaseBody: "See the assets below for the installers."
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}
