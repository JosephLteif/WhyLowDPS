name: Release
on:
  push:
    tags:
      - 'v*'

jobs:
  publish:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: 'windows-latest'
            args: '--config desktop/src-tauri/tauri.conf.json'
          - platform: 'macos-latest'
            args: '--config desktop/src-tauri/tauri.conf.json'
          - platform: 'ubuntu-22.04'
            args: '--config desktop/src-tauri/tauri.conf.json'

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: install dependencies (ubuntu only)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.0-dev libnm-dev libcloudproviders-dev librsvg2-dev build-essential curl wget libssl-dev libgtk-3-dev libayatana-appindicator3-dev liblibrsvg2-dev

      - name: install dependencies
        run: npm install && npm install --prefix frontend

      - name: prepare resources (download simc)
        shell: bash
        run: |
          mkdir -p backend/resources/simc
          mkdir -p backend/resources/data
          
          # Download SimC for Windows
          if [[ "${{ matrix.platform }}" == "windows-latest" ]]; then
            echo "Downloading SimC for Windows..."
            curl -L "https://nightly.link/simulationcraft/simc-publish/workflows/nightly/thewarwithin/Windows%20Nightly%20x64.zip" -o simc_win.zip
            unzip simc_win.zip -d backend/resources/simc/
            # The zip contains another .7z file usually, but nightly.link often zips the artifact.
            # If it's a 7z inside the zip:
            find backend/resources/simc -name "*.7z" -exec 7z x {} -obackend/resources/simc/ \;
            # Move the actual exe to the root of the simc folder
            find backend/resources/simc -name "simc.exe" -exec mv {} backend/resources/simc/ \;
          fi
          
          # Download SimC for Linux
          if [[ "${{ matrix.platform }}" == "ubuntu-22.04" ]]; then
            echo "Downloading SimC for Linux..."
            curl -L "https://nightly.link/simulationcraft/simc-publish/workflows/nightly/thewarwithin/Linux%20Nightly%20x64.zip" -o simc_linux.zip
            unzip simc_linux.zip -d backend/resources/simc/
            find backend/resources/simc -name "*.tar.gz" -exec tar -xzf {} -C backend/resources/simc/ --strip-components=1 \;
            # Ensure the binary is executable
            chmod +x backend/resources/simc/simc || true
          fi

          # Ensure directories exist for Tauri glob
          touch backend/resources/data/.keep
          touch backend/resources/simc/.keep
          
          echo "SimC preparation complete."
          ls -R backend/resources/simc

      - name: build frontend
        env:
          DESKTOP_BUILD: true
        run: npm run build --prefix frontend

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: v__VERSION__
          releaseName: "WhyLowDps v__VERSION__"
          releaseBody: "See the assets below for the installers."
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}
