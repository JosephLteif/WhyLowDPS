name: simhammer

services:
  db:
    image: postgres:16-alpine
    restart: always
    environment:
      - POSTGRES_USER=simhammer
      - POSTGRES_PASSWORD=simhammer
      - POSTGRES_DB=simhammer
    ports:
      - "5432:5432"
    volumes:
      - simhammer-db-data:/var/lib/postgresql/data

  backend:
    build:
      context: backend
      dockerfile: server/Dockerfile
      args:
        - SIMC_VERSION=${SIMC_VERSION:-HEAD}
    ports:
      - "8000:8000"
    depends_on:
      - db
    env_file:
      - .env
    environment:
      - DATA_DIR=/app/resources/data
      - DATABASE_URL=postgres://simhammer:simhammer@db:5432/simhammer
      - PORT=8000

  frontend:
    build:
      context: frontend
      args:
        - NEXT_PUBLIC_API_URL=https://${SERVER_IP:-localhost}
        - INTERNAL_API_URL=http://backend:8000
    environment:
      - INTERNAL_API_URL=http://backend:8000
    ports:
      - "3000:3000"

volumes:
  simhammer-db-data:
