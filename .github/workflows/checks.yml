name: Checks

on:
  pull_request:
  push:
    branches:
      - master
      - main

concurrency:
  group: checks-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    name: Detect Changed Areas
    runs-on: ubuntu-latest
    outputs:
      frontend: ${{ steps.filter.outputs.frontend }}
      backend: ${{ steps.filter.outputs.backend }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Filter changed paths
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            frontend:
              - 'frontend/**'
              - '.github/workflows/checks.yml'
              - 'package.json'
              - 'package-lock.json'
            backend:
              - 'backend/**'
              - 'scripts/**'
              - 'Cargo.toml'
              - 'Cargo.lock'
              - '.github/workflows/checks.yml'
              - 'package.json'
              - 'package-lock.json'

  frontend_quality:
    name: Frontend Quality
    needs: changes
    if: github.event_name != 'pull_request' || needs.changes.outputs.frontend == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci --prefix frontend

      - name: Frontend checks
        run: npm run typecheck:frontend && npm run lint:frontend

      - name: Build frontend
        run: npm run build:frontend

  backend_quality:
    name: Backend Quality
    needs: changes
    if: github.event_name != 'pull_request' || needs.changes.outputs.backend == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2

      - name: Backend checks
        run: cargo clippy -p whylowdps-core -p whylowdps-server --all-targets

      - name: Backend and script tests
        run: cargo test -p whylowdps-core -p whylowdps-server && node --test scripts/tests/*.test.js

  tauri_build_check:
    if: github.event_name == 'push'
    name: Tauri Build Check
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            package-lock.json
            frontend/package-lock.json

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Ensure Tauri resource paths exist
        shell: bash
        run: |
          mkdir -p backend/resources/data
          mkdir -p backend/resources/simc
          echo "{}" > backend/resources/zones-encounters-index.json
          touch backend/resources/data/.keep
          touch backend/resources/simc/.keep

      - name: Install dependencies
        run: npm ci && npm ci --prefix frontend

      - name: Run Tauri build check
        run: npm run tauri:build:check
