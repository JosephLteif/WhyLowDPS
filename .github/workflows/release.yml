name: Release
on:
  push:
    tags:
      - 'v*'

jobs:
  publish:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: 'windows'
            os: 'windows-latest'
            args: '--config src-tauri/tauri.conf.json'

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: install dependencies (ubuntu only)
        if: matrix.platform == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.0-dev libnm-dev libcloudproviders-dev librsvg2-dev build-essential curl wget libssl-dev libgtk-3-dev libayatana-appindicator3-dev liblibrsvg2-dev

      - name: install dependencies
        run: npm install && npm install --prefix frontend

      - name: Cache Rust build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            backend/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('backend/**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      # -- SimC Preparation --
      - name: Resolve SimC version
        id: simc-version
        shell: bash
        run: |
          HASH=$(git ls-remote https://github.com/simulationcraft/simc.git HEAD | cut -f1)
          echo "hash=$HASH" >> "$GITHUB_OUTPUT"

      - name: Cache SimC binary
        id: simc-cache
        uses: actions/cache@v4
        with:
          path: backend/resources/simc
          key: ${{ runner.os }}-simc-${{ steps.simc-version.outputs.hash }}

      - name: Download SimC binary (Windows)
        if: steps.simc-cache.outputs.cache-hit != 'true' && matrix.platform == 'windows'
        shell: bash
        run: |
          mkdir -p backend/resources/simc
          curl -L "https://nightly.link/simulationcraft/simc-publish/workflows/nightly/master/simc-nightly-win64-midnight.zip" -o simc_win.zip
          unzip simc_win.zip -d backend/resources/simc/
          find backend/resources/simc -name "*.7z" -exec 7z x {} -obackend/resources/simc/ \;
          find backend/resources/simc -name "simc.exe" -exec mv {} backend/resources/simc/ \;
          touch backend/resources/simc/.keep

      - name: Build SimC from source (Linux)
        if: steps.simc-cache.outputs.cache-hit != 'true' && matrix.platform == 'linux'
        shell: bash
        run: |
          mkdir -p backend/resources/simc
          git clone --depth 1 https://github.com/simulationcraft/simc.git /tmp/simc-src
          cd /tmp/simc-src/engine
          make -j$(nproc) OPTS="-O2" LTO=1 optimized
          cp simc ${{ github.workspace }}/backend/resources/simc/simc
          chmod +x ${{ github.workspace }}/backend/resources/simc/simc
          rm -rf /tmp/simc-src
          touch ${{ github.workspace }}/backend/resources/simc/.keep

      # -- Game Data Preparation --
      - name: Fetch game data
        shell: bash
        run: |
          mkdir -p backend/resources/data-full
          cd backend/resources/data-full
          curl -sL -o metadata.json https://www.raidbots.com/static/data/live/metadata.json
          # Download all required data files listed in metadata
          node -e "const m=require('./metadata.json'); m.files.forEach(f=>console.log(f))" | xargs -I {} -P 8 curl -sL -o "{}" "https://www.raidbots.com/static/data/live/{}"
          # Copy local season config and supplemental data
          cp ../../core/season-config.json ./season-config.json 2>/dev/null || true
          cd ../../..
          node backend/scripts/compact-data.js backend/resources/data-full backend/resources/data
          touch backend/resources/data/.keep

      # -- Build and Release --
      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          DESKTOP_BUILD: true
          NEXT_PUBLIC_DESKTOP_BUILD: true
        with:
          projectPath: desktop
          tagName: ${{ github.ref_name }}
          releaseName: "WhyLowDps ${{ github.ref_name }}"
          releaseBody: "See the assets below for the installers."
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}
