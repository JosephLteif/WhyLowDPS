name: Checks

on:
  pull_request:
  push:
    branches:
      - master
      - main

jobs:
  quality:
    name: Typecheck, Lint, Test, Frontend Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            package-lock.json
            frontend/package-lock.json

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Ensure Tauri resource paths exist
        shell: bash
        run: |
          mkdir -p backend/resources/data
          mkdir -p backend/resources/simc
          echo "{}" > backend/resources/zones-encounters-index.json
          touch backend/resources/data/.keep
          touch backend/resources/simc/.keep

      - name: Install Linux system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            curl \
            wget \
            file \
            pkg-config \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libsoup-3.0-dev \
            libssl-dev \
            libdbus-1-dev \
            libglib2.0-dev \
            libjavascriptcoregtk-4.1-dev

      - name: Install dependencies
        run: npm ci && npm ci --prefix frontend

      - name: Run check suite
        run: npm run check

      - name: Build frontend
        run: npm run build:frontend

  tauri_build_check:
    name: Tauri Build Check
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            package-lock.json
            frontend/package-lock.json

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Ensure Tauri resource paths exist
        shell: bash
        run: |
          mkdir -p backend/resources/data
          mkdir -p backend/resources/simc
          echo "{}" > backend/resources/zones-encounters-index.json
          touch backend/resources/data/.keep
          touch backend/resources/simc/.keep

      - name: Install dependencies
        run: npm ci && npm ci --prefix frontend

      - name: Run Tauri build check
        run: npm run tauri:build:check
